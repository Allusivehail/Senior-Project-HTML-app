<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f2f5;
            --white: #ffffff;
            --surface: #fafbfc;
            --border: #e2e6ea;
            --border-strong: #cdd3da;
            --accent: #0069d9;
            --accent-light: #e8f0fb;
            --accent-mid: #b8d0f5;
            --text: #1a2332;
            --text-mid: #4a5568;
            --text-muted: #8a95a3;
            --mono: 'DM Mono', monospace;
            --serif: 'Instrument Serif', serif;
            --sans: 'DM Sans', sans-serif;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
            --shadow-hover: 0 2px 8px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 31px,
                rgba(0,0,0,0.022) 31px,
                rgba(0,0,0,0.022) 32px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* TOP BAR */
        .topbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            height: 64px;
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }

        .topbar-wordmark {
            font-family: var(--serif);
            font-size: 22px;
        }

        .topbar-wordmark em {
            font-style: italic;
            color: var(--accent);
        }

        .topbar-nav {
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            padding: 7px 20px;
            border: 1px solid var(--border-strong);
            border-radius: 7px;
            background: var(--surface);
            color: var(--text-mid);
            cursor: pointer;
            text-decoration: none;
        }

        .section-rule {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 22px 36px 6px;
        }

        .section-rule span {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .section-rule::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .main {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            padding: 12px 36px 36px;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .card-body { padding: 22px; }

        /* CAMERA */
        .cam-viewport {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cam { width: 100%; height: 100%; display: none; }

        /* DIAGNOSTICS */
        .diag-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .diag-row {
            display: grid;
            grid-template-columns: 148px 1fr 68px;
            align-items: center;
            gap: 14px;
            padding: 11px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .diag-label {
            font-size: 12px;
            color: var(--text-mid);
        }

        .diag-value {
            font-family: var(--mono);
            font-size: 13px;
            text-align: right;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

<header class="topbar">
    <span class="topbar-wordmark">Dash<em>board</em></span>
    <nav class="topbar-nav">
        <a href="/inventory" class="nav-btn">Inventory</a>
    </nav>
</header>

<div class="section-rule"><span>Fridge Diagnostics</span></div>

<div class="main">

    <!-- CAMERA -->
    <div class="card">
        <div class="card-header">Camera</div>
        <div class="card-body">
            <div class="cam-viewport">
                <img id="cam">
            </div>
        </div>
    </div>

    <!-- DIAGNOSTICS -->
    <div class="card">
        <div class="card-header">Sensors</div>
        <div class="card-body">

            <div class="diag-grid">

                <div class="diag-row">
                    <div class="diag-label">Temperature</div>
                    <div></div>
                    <div class="diag-value" id="tempVal">--</div>
                </div>

                <div class="diag-row">
                    <div class="diag-label">Ethanol</div>
                    <div></div>
                    <div class="diag-value" id="ethanolVal">--</div>
                </div>

                <div class="diag-row">
                    <div class="diag-label">Ammonia</div>
                    <div></div>
                    <div class="diag-value" id="ammoniaVal">--</div>
                </div>

                <div class="diag-row">
                    <div class="diag-label">Hydrogen Sulfide</div>
                    <div></div>
                    <div class="diag-value" id="h2sVal">--</div>
                </div>

            </div>

        </div>
    </div>

</div>

<!-- CAMERA SCRIPT -->
<script>
function loadImage() {
    const img = document.getElementById("cam");
    img.src = "/static/IMG/http_test_image.png?rand=" + Math.random();
    img.style.display = "block";
}

async function captureImage() {
    await fetch("/api/capture-image");
    loadImage();
}
</script>

<!-- LIVE GAS DATA -->
<script>
async function loadGasData() {
    try {
        const res = await fetch('/api/gas-data');
        const data = await res.json();

        document.getElementById('tempVal').textContent = data.Temperature ?? '--';
        document.getElementById('ethanolVal').textContent = data.Ethanol ?? '--';
        document.getElementById('ammoniaVal').textContent = data.Ammonia ?? '--';
        document.getElementById('h2sVal').textContent = data["Hydrogen Sulfide"] ?? '--';

    } catch (err) {
        console.error("Gas fetch error:", err);
    }
}

loadGasData();
setInterval(loadGasData, 2000);
</script>

</body>
</html>
