
<!DOCTYPE html>
<html>
<head>
    <title>Fridge Diagnostics</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f2f5;
            --white: #ffffff;
            --surface: #fafbfc;
            --border: #e2e6ea;
            --accent: #0069d9;
            --text: #1a2332;
            --text-mid: #4a5568;
            --text-muted: #8a95a3;
            --serif: 'Instrument Serif', serif;
            --sans: 'DM Sans', sans-serif;
            --mono: 'DM Mono', monospace;
            --radius: 16px;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .topbar {
            background: white;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .topbar-wordmark {
            font-family: var(--serif);
            font-size: 20px;
        }

        .topbar-wordmark em {
            color: var(--accent);
        }

        /* MAIN FULL HEIGHT */
        .main {
            flex: 1;
            padding: 12px;
            display: flex;
        }

        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .card-header {
            padding: 12px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .card-body {
            flex: 1;
            padding: 12px;
            display: flex;
        }

        /* FULLSCREEN GRID */
        .gas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: 1fr;
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        .gas-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .gas-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .gas-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="topbar">
        <div class="topbar-wordmark">Fridge <em>Sniffer</em></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
   
          
            <div class="card-body">
                <div class="gas-grid">

                    <div class="gas-box">
                        <div class="gas-title">Temperature</div>
                        <div class="gas-value">--</div>
                    </div>
   
                    <div class="gas-box">
                        <div class="gas-title">Ethanol</div>
                        <div class="gas-value">--</div>
                    </div>

                    <div class="gas-box">
                        <div class="gas-title">Ammonia</div>
                        <div class="gas-value">--</div>
                    </div>

                    <div class="gas-box">
                        <div class="gas-title">Hydrogen Sulfide</div>
                        <div class="gas-value">--</div>
                    </div>


                    </div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
