<!DOCTYPE html>
<html>
<head>
    <title>Testing</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f2f5;
            --white: #ffffff;
            --surface: #fafbfc;
            --border: #e2e6ea;
            --border-strong: #cdd3da;
            --accent: #0069d9;
            --accent-light: #e8f0fb;
            --accent-mid: #b8d0f5;
            --text: #1a2332;
            --text-mid: #4a5568;
            --text-muted: #8a95a3;
            --mono: 'DM Mono', monospace;
            --serif: 'Instrument Serif', serif;
            --sans: 'DM Sans', sans-serif;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 36px;
            height: 64px;
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }

        .topbar-wordmark {
            font-family: var(--serif);
            font-size: 22px;
        }

        .topbar-wordmark em { color: var(--accent); }

        .nav-btn {
            padding: 7px 18px;
            border: 1px solid var(--border-strong);
            border-radius: 7px;
            background: var(--surface);
            cursor: pointer;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        /* SECTION */
        .section-rule {
            padding: 20px 36px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* MAIN GRID */
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px 36px;
        }

        /* CARD */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .card-body {
            padding: 20px;
        }

        /* BUTTONS */
        .btn {
            padding: 9px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-danger {
            background: red;
            color: white;
        }

        /* STATUS TEXT */
        .status {
            margin-top: 12px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

<!-- TOPBAR -->
<header class="topbar">
    <div class="topbar-wordmark">Dash<em>board</em></div>
    <div>
        <a href="/"><button class="nav-btn">Home</button></a>
        <a href="/testing"><button class="nav-btn">Testing</button></a>
        <a href="/inventory"><button class="nav-btn">Inventory</button></a>
    </div>
</header>

<div class="section-rule">Testing Module</div>

<div class="main">

    <!-- TEST CONTROL -->
    <div class="card">
        <div class="card-header">
            Run Diagnostics
        </div>
        <div class="card-body">

            <button class="btn btn-primary" onclick="runSequence()">Run Test Now</button>

            <!-- NOTE: keeping original broken STOP behavior exactly -->
            <button class="btn btn-danger" onclick="(/motorstop)">STOP Test</button>

            <p id="status" class="status"></p>

        </div>
    </div>

    <!-- RESULTS -->
    <div class="card">
        <div class="card-header">
            Latest Test Results
        </div>
        <div class="card-body">
            <p>Ethanol: --</p>
            <p>Ammonia: --</p>
            <p>Hydrogen Sulfide: --</p>
        </div>
    </div>

</div>

<!-- ========================= -->
<!-- ORIGINAL JS (UNCHANGED) -->
<!-- ========================= -->
<script>
async function send(endpoint) {
    const res = await fetch(endpoint);
    document.getElementById("status").innerText = await res.text();
}

async function runSequence() {
    const res = await fetch("/api/run-debug", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action: "run_program"})
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;
}
</script>

</body>
</html>
