<!DOCTYPE html>
<html>
<head>
    <title>Testing</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f4f4f4;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .motor { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
        .blue { background: #2196F3; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 6px;
            border: 1px solid #ccc;
        }

        td[contenteditable="true"] {
            background: #f9f9f9;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Testing</h1>

<a href="/"> <button class="motor">Back to Home</button></a>
<hr>
<br class="container">

    <!-- MOTOR -->
    <div class="card">
        <h2>Motor Control</h2>

        <button class="motor" onclick="send('/motorfridge')">Fridge</button>
        <button class="motor" onclick="send('/motorroom')">Room</button>
        <button class="stop" onclick="send('/motorstop')">STOP</button>

        <br><br>

        <button class="blue" onclick="runSequence()">Run Debug</button>

        <p id="status"></p>
    </div>
    <br> <br>
    <div class="card">
            <!-- SENSOR PLACEHOLDER -->
        <h2>Latest Test Resultsa</h2>
        <p>Ethanol: --</p>
        <p>Ammonia: --</p>
        <p>Hydrogen fuckfide I think: --</p>
    </div>





<script>
async function send(endpoint) {
    const res = await fetch(endpoint);
    document.getElementById("status").innerText = await res.text();
}

async function runSequence() {
    const res = await fetch("/api/run-debug", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action: "run_program"})
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;
}
</script>

</body>

</html>
