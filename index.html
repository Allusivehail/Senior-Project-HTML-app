<!DOCTYPE html>
<html>
<head>
    <title>System Control Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f4f4f4;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .motor { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
        .blue { background: #2196F3; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 6px;
            border: 1px solid #ccc;
        }

        td[contenteditable="true"] {
            background: #f9f9f9;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>System Control Dashboard</h1>

<div class="container">

    <!-- MOTOR -->
    <div class="card">
        <h2>Motor Control</h2>

        <button class="motor" onclick="send('/motorfridge')">Fridge</button>
        <button class="motor" onclick="send('/motorroom')">Room</button>
        <button class="stop" onclick="send('/motorstop')">STOP</button>

        <br><br>

        <button class="blue" onclick="runSequence()">Run Debug</button>

        <p id="status"></p>
    </div>

    <!-- CAMERA -->
    <div class="card">
        <h2>Camera</h2>

        <button class="blue" onclick="captureImage()">Take Picture</button>
        <button onclick="loadImage()">Refresh Image</button>

        <p id="cameraStatus"></p>

        <img id="cam" style="max-width:100%; border-radius:8px;">
    </div>

    <!-- INVENTORY -->
    <div class="card">
        <h2>Inventory (Editable)</h2>

        <h4>Add Item</h4>
        <input id="newItem" placeholder="Item">
        <input id="newDate" placeholder="Date In">
        <input id="newExp" placeholder="Expiration">
        <button class="blue" onclick="addRow()">Add</button>

        <br><br>

        <div style="max-height:300px; overflow-y:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Date In</th>
                        <th>Expiration</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="yoloBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>

// ----------------------------
// BASIC REQUESTS
// ----------------------------
async function send(endpoint) {
    const res = await fetch(endpoint);
    document.getElementById("status").innerText = await res.text();
}

async function runSequence() {
    const res = await fetch("/api/run-debug", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({action: "run_program"})
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;
}

// ----------------------------
// CAMERA: LOAD IMAGE
// ----------------------------
function loadImage() {
    document.getElementById("cam").src =
        "/static/IMG/http_test_image.png?rand=" + Math.random();
}

// ----------------------------
// CAMERA: TAKE PICTURE (NEW FIX)
// ----------------------------
async function captureImage() {
    const res = await fetch("/api/capture-image");
    const data = await res.json();

    document.getElementById("cameraStatus").innerText = data.message;

    // Always refresh image view (even if backend is fake/debug)
    document.getElementById("cam").src =
        "/static/IMG/http_test_image.png?rand=" + Math.random();
}

// ----------------------------
// LOAD TABLE
// ----------------------------
async function loadJSON() {
    const res = await fetch("/api/get-json");
    const json = await res.json();

    const data = json.data;
    const table = document.getElementById("yoloBody");
    table.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td contenteditable="true" onblur="updateRow(${row.id}, this)">
                ${row.Item || ""}
            </td>

            <td contenteditable="true" onblur="updateRow(${row.id}, this)">
                ${row["Date In"] || ""}
            </td>

            <td contenteditable="true" onblur="updateRow(${row.id}, this)">
                ${row["Expected Expiration"] || ""}
            </td>

            <td>
                <button class="delete-btn" onclick="deleteRow(${row.id})">
                    Delete
                </button>
            </td>
        `;

        table.appendChild(tr);
    });
}

// ----------------------------
// UPDATE ROW
// ----------------------------
async function updateRow(id, cell) {
    const row = cell.parentElement;
    const c = row.children;

    await fetch("/api/update-row", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            id: id,
            Item: c[0].innerText.trim(),
            "Date In": c[1].innerText.trim(),
            "Expected Expiration": c[2].innerText.trim()
        })
    });
}

// ----------------------------
// ADD ROW
// ----------------------------
async function addRow() {
    await fetch("/api/add-row", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            Item: document.getElementById("newItem").value,
            "Date In": document.getElementById("newDate").value,
            "Expected Expiration": document.getElementById("newExp").value
        })
    });

    document.getElementById("newItem").value = "";
    document.getElementById("newDate").value = "";
    document.getElementById("newExp").value = "";

    loadJSON();
}

// ----------------------------
// DELETE ROW
// ----------------------------
async function deleteRow(id) {
    const confirmDelete = confirm("Are you sure you want to delete this row?");

    if (!confirmDelete) return;

    await fetch("/api/delete-row", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: id })
    });

    loadJSON();
}

// ----------------------------
// INIT
// ----------------------------
window.onload = function () {
    loadJSON();
    loadImage();
};

</script>

</body>
</html>
